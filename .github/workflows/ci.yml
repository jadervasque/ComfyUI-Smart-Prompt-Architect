name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: python -m pytest --cov=prompt_architect --cov-report=term-missing --cov-fail-under=80
      - run: python -m pytest --cov=prompt_architect.domain --cov=prompt_architect.application --cov-report=term --cov-fail-under=90
      - run: node --test tests/frontend/state.test.mjs
      - run: node --check prompt_architect/web/prompt_architect.js
      - run: python -m scripts.validate_data
      - run: python -m scripts.validate_catalog_semantics
      - run: python -m scripts.catalog_stats
      - run: python -m scripts.find_catalog_duplicates
      - run: python -m build

  property:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m tests.property_profiles
      - run: python -m scripts.benchmark --iterations 1000 --max-seconds 300
