repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff check
        entry: python -m ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: Ruff format check
        entry: python -m ruff format --check .
        language: system
        pass_filenames: false
      - id: mypy
        name: Mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
      - id: unit-tests
        name: Python unit tests
        entry: python -m unittest discover -s tests -v
        language: system
        pass_filenames: false
      - id: frontend-tests
        name: Frontend state tests
        entry: node --test tests/frontend/state.test.mjs
        language: system
        pass_filenames: false
